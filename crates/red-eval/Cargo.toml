[package]
name = "red-eval"
version = "0.2.0"
edition = "2021"

[features]
# Re-export of `red-core/stats`: gates `Env::max_frame_depth` /
# `Env::instr_count` instrumentation used by the v0.3 VM benchmarks and
# parity tests. Off by default so release builds pay zero cost.
stats = ["red-core/stats"]

[dependencies]
red-core = { path = "../red-core" }
ureq = "2"

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "eval"
harness = false
